
# ─────────────────────────────────────────────────────────────────
# GitOps — Dev Environment Docker Compose
#
# ArgoCD watches this file and deploys it to the dev GCE VM
# Images are pulled from GCP Artifact Registry
# VM service account authenticates automatically — no keys needed
#
# Image URL format:
# us-central1-docker.pkg.dev/expandox-project-2/cloudopshub/image:tag
# ─────────────────────────────────────────────────────────────────

version: "3.8"

services:

  # ── MySQL Database ──────────────────────────────────────────────
  mysql:
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub/theepicbook-mysql:latest
    container_name: theepicbook-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: demo1234
      MYSQL_DATABASE:      bookstore
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - theepicbook-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping",
             "-h", "localhost",
             "-u", "root",
             "-pdemo1234"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Node.js Application ─────────────────────────────────────────
  app:
    # Image tag updated by CI pipeline on every push
    # CI replaces :latest with the actual commit SHA
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub/theepicbook-backend:547a58aca328521a3daae987040af6eaf153166a
    container_name: theepicbook-app
    restart: unless-stopped
    environment:
      PORT:        8080
      NODE_ENV:    production
      DB_HOST:     mysql
      DB_USER:     root
      DB_PASSWORD: demo1234
      DB_NAME:     bookstore
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - theepicbook-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose",
             "--tries=1", "--spider",
             "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub/theepicbook-frontend:547a58aca328521a3daae987040af6eaf153166a
    container_name: theepicbook-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - theepicbook-network

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: theepicbook-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    networks:
      - theepicbook-network

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: theepicbook-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    networks:
      - theepicbook-network

  # ── Node Exporter ───────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: theepicbook-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - theepicbook-network

  # ── Alertmanager ────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: theepicbook-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - theepicbook-network

volumes:
  mysql_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  theepicbook-network:
    driver: bridge
