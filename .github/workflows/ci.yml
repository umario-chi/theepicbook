name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PROJECT_ID: expandox-project-2
  REGION: us-central1
  REPO: cloudopshub
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ── Code Stage: Secure Source Code (Snyk + SonarQube) ──
  snyk-code-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Snyk code and dependency scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=package.json

  sonarqube-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.organization=umario-chi
            -Dsonar.projectKey=cloudopshub-theepicbook
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,public/assets/js/materialize*
      - name: SonarQube quality gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Commit Stage: Prevent Secret Leaks (Gitleaks) ──
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Lint & Audit ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: npm audit
        run: npm audit --audit-level=high

  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/app/Dockerfile
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/nginx/Dockerfile
      - name: Lint Database Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/mysql/Dockerfile

  # ── Build Stage: Build, Scan, Push Docker Images ──
  build-and-push:
    needs: [lint, snyk-code-scan, sonarqube-scan, gitleaks, docker-lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to GCP ──
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      # ── Build Backend ──
      - name: Build Backend image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-backend:$IMAGE_TAG \
            -f docker/app/Dockerfile .
          docker tag $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-backend:$IMAGE_TAG \
                     $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-backend:latest

      # ── Build Frontend ──
      - name: Build Frontend image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-frontend:$IMAGE_TAG \
            -f docker/nginx/Dockerfile docker/nginx
          docker tag $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-frontend:$IMAGE_TAG \
                     $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-frontend:latest

      # ── Build Database ──
      - name: Build Database image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-database:$IMAGE_TAG \
            docker/mysql/
          docker tag $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-database:$IMAGE_TAG \
                     $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-database:latest

      # ── Install Trivy ──
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version

      # ── Trivy Scans ──
      - name: Trivy scan Backend image
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 1 \
            --ignorefile .trivyignore \
            $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-backend:$IMAGE_TAG
        continue-on-error: true

      - name: Trivy scan Frontend image
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 1 \
            --ignorefile .trivyignore \
            $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-frontend:$IMAGE_TAG
        continue-on-error: true

      - name: Trivy scan Database image
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 0 \
            --ignorefile .trivyignore \
            $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-database:$IMAGE_TAG

      # ── Push to Artifact Registry ──
      - name: Push Backend image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-backend:$IMAGE_TAG
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-backend:latest

      - name: Push Frontend image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-frontend:$IMAGE_TAG
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-frontend:latest

      - name: Push Database image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-database:$IMAGE_TAG
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/theepicbook-database:latest