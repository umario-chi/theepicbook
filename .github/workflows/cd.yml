
# ─────────────────────────────────────────────────────────────────
# CD PIPELINE — GitHub Actions
#
# Official docs:
# https://docs.github.com/en/actions
#
# Triggers after CI pipeline completes successfully
#
# Pipeline stages:
# 1. Update GitOps    — update image tags in gitops/ manifests
# 2. Commit + Push    — push updated manifests to repo
# 3. Deploy to VM     — SSH via IAP, pull new images, restart services
# ─────────────────────────────────────────────────────────────────

name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

env:
  PROJECT_ID:    expandox-project-2
  REGION:        us-central1
  REPOSITORY_ID: cloudopshub
  VM_NAME:       dev-app-vm
  VM_ZONE:       us-central1-a

  # Image names
  BACKEND_IMAGE:  theepicbook-backend
  FRONTEND_IMAGE: theepicbook-frontend
  DATABASE_IMAGE: theepicbook-database

jobs:

  # ── JOB 1: Update GitOps Manifests ──────────────────────────────
  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get commit SHA
        id: sha
        run: |
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

      # Update image tags in dev GitOps manifest
      - name: Update dev image tags
        run: |
          SHA=${{ steps.sha.outputs.sha }}

          sed -i "s|$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY_ID/$BACKEND_IMAGE:.*|$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY_ID/$BACKEND_IMAGE:$SHA|g" \
            gitops/dev/docker-compose.yml

          sed -i "s|$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY_ID/$FRONTEND_IMAGE:.*|$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY_ID/$FRONTEND_IMAGE:$SHA|g" \
            gitops/dev/docker-compose.yml

          sed -i "s|$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY_ID/$DATABASE_IMAGE:.*|$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY_ID/$DATABASE_IMAGE:$SHA|g" \
            gitops/dev/docker-compose.yml

      - name: Commit and push updated manifests
        run: |
          git config user.email "github-actions@cloudopshub.com"
          git config user.name  "GitHub Actions"
          git add gitops/dev/docker-compose.yml
          git diff --staged --quiet || \
            git commit -m "cd: update dev image tags to ${{ steps.sha.outputs.sha }}"
          git push

  # ── JOB 2: Deploy to VM via IAP SSH ─────────────────────────────
  deploy-vm:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: update-gitops

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account:            ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy and verify via IAP SSH
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command="
              cd /opt/cloudopshub && \
              git pull origin main && \
              docker-compose -f gitops/dev/docker-compose.yml pull && \
              docker-compose -f gitops/dev/docker-compose.yml up -d && \
              echo '── Deployment complete ──' && \
              docker-compose -f gitops/dev/docker-compose.yml ps
            "
